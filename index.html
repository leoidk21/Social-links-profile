<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./social-links.css">
  <link rel="stylesheet" href="./assets/fonts/Inter-VariableFont_slnt,wght.ttf">
  <link rel="stylesheet" href="./assets/fonts/static/Inter-Bold.ttf">
  <link rel="stylesheet" href="./assets/fonts/static/Inter-Regular.ttf">
  <link rel="stylesheet" href="./assets/fonts/static/Inter-SemiBold.ttf">

  <title>Frontend Mentor | Social links profile</title>
</head>
<body>
  <div class="main-container">
    <div class="wrapper">
      <img src="/assets/images/avatar-jessica.jpeg" alt="avatar" class="avatar">
  
      <h1 class="avatar-name">Jessica Randall</h1>
      <h4 class="location">London, United Kingdom</h4>
      <p class="avatar-description">"Front-end developer and avid reader."</p> 
    </div>
  
    <div class="social-links">
      <div class="social-link-card">
        GitHub
      </div>
      <div class="social-link-card">
        Frontend Mentor
      </div>
      <div class="social-link-card">
        LinkedIn
      </div>
      <div class="social-link-card">
        Twitter
      </div> 
      <div class="social-link-card">
        Instagram
      </div>
      
    </div>
  </div>
  
</body>
</html>
